<!DOCTYPE html>
<html>
    <head>
        <title>
            Calulator
        </title>
        <style>
            body {
                font-family: roboto, arial;
                background-color: black;
                color: greenyellow;
            }

            .frame {
                border: 2px solid greenyellow;
                margin-left: 350px;
                width: 500px;
                height: 650px;
                margin-top: 150px;
            }

            .num-holder {
                border: 2px solid greenyellow;
                height: 100px;
                width: 498px;
                margin-top: 50px;
            }

            .numbs {
                display: grid;
                grid-template-columns: repeat(4, 110px);
                column-gap: 10px;
                gap: 12px;
                color: greenyellow;
                width: 450px;
                height: 280px;
                margin-top: 25px;
                margin-left: 10px;
            }

            .num,.math {
                background-color: black;
                color: greenyellow;
                border: 1px solid greenyellow;
                height: 80px;
                width: 80px;
                font-size: 30px;
                cursor: pointer;
            }

            .num:hover {
                box-shadow: 0 0 12px greenyellow;
            }

            .math:hover {
                box-shadow: 0 0 12px greenyellow;
            }
        </style>
    </head>
    <body>
                
        <div class="frame">
            <div id="console" class="num-holder"></div>
            <div class="numbs" >
                <button class="num" onclick="number('');">C</button>
                <button class="num" onclick="number(' () ');">()</button>
                <button class="num" onclick="number(' / ');">÷</button>
                <button class="num" onclick="number(' % ');">%</button>
                <button class="num" onclick="number('1');">1</button>
                <button class="num" onclick="number(2);">2</button>
                <button class="num" onclick="number(3);">3</button>
                <button class="math" onclick="number(' - ');">-</button>
                <button class="num" onclick="number(4);">4</button>
                <button class="num" onclick="number(5);">5</button>
                <button class="num" onclick="number(6);">6</button>
                <button class="math" onclick="number(' * ');">x</button>
                <button class="num" onclick="number(7);">7</button>
                <button class="num" onclick="number(8);">8</button>
                <button class="num" onclick="number(9);">9</button>
                <button class="math" onclick="number(' + ');">+</button>
                <button class="num" onclick="number('.');">.</button>
                <button class="num" onclick="number(0);">0</button>
                <button class="num" onclick="number('.');">T</button>
                <button class="math" onclick="number(' = ');">=</button>
            </div>
        </div>
        <script>
        let calculation = "";

        function number(num) {
            if (num === '') {
                calculation = "";
            } else if (num === ' = ') {
                try {
                    calculation = eval(calculation).toString();
                } catch {
                    calculation = "Error";
                }
            } else {
                calculation += num;
            }

            console.log(calculation);
            return calculation;
        }
        </script>
    </body>
</html>
