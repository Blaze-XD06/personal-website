<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>rps</title>
        <style>
            body {
                background-color: black;
                color: greenyellow;
            }

            .main-heading {
                display: flex;
                justify-content: center;
            }

            button {
                background-color: black;
                color: greenyellow;
                border:2px solid greenyellow;
                cursor: pointer;
                height: 30px;
                width: 80px;
                margin-bottom: 10px;
            }

            .button-main {
                width: 250px;
                height: 250px;
                margin-left: 50px;
            }

            .buttons {
                display: flex;
                justify-content: center;
                margin-top: 50px;
                margin-left: 90px;
            }
        </style>
    </head>
    <body>
        <div class="main-heading"><h1>Rock Paper Scissors</h1></div>
        <main class="buttons">
            <div class="button-main">
                <button onclick="
                playGame('Rock');
                ">Rock</button>

            </div>
                
            <div class="button-main">
                <button onclick="
                 playGame('Paper');
                ">Paper</button>

            </div>
            <div class="button-main">
                <button onclick="
                playGame('Scissors');
                ">Scissors</button>
            </div>

    </main>
        

        <script>
            function playGame(playerMove) {
                const computerMove = pickComputerMove();

                let result = '';

                if (playerMove === 'Scissors') {
                  if (computerMove === 'Scissors') {
                result = 'Tie.';
                } else if (computerMove === 'Rock') {
                    result = 'You Lose!';
                } else if (computerMove === 'Paper') {
                    result = 'You win!';
                }
                } else if (playerMove === 'Paper') {
                  if (computerMove === 'Paper') {
                result = 'Tie.';
                } else if (computerMove === 'Scissors') {
                    result = 'You Lose!';
                } else if (computerMove === 'Rock') {
                    result = 'You win!';
                }
                } else if (playerMove === 'Rock') {
                  if (computerMove === 'Rock') {
                result = 'Tie.';
                } else if (computerMove === 'Paper') {
                    result = 'You Lose!';
                } else if (computerMove === 'Scissors') {
                    result = 'You win!';
                }
                }

                alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}`);
            }


            function pickComputerMove() {
            const randomNumber = Math.random();

            let computerMove = '';

            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'Rock';
            } else if (randomNumber >= 1 /3 && randomNumber < 2 / 3) {
                computerMove = 'Paper';
            } else if (randomNumber >= 2/3 && randomNumber < 1) {
                computerMove = 'Scissors';
            }

            return computerMove;
            }
        </script>
    </body>
</html>
